name: Docs Publish
on:
  release:
    types:
    - published
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: "3.11"
    - name: Install Dependencies
      run: uv sync --frozen
    - name: Deploy Docs
      run: uv run mkdocs gh-deploy --force
