name: Testing

on:
  push:
    branches:
    - main
    - dev
  pull_request:
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  PYTHON_VERSION: "3.9"
jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
    - name: Run cargo clippy
      run: cargo clippy --all-targets -- --deny warnings
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
    - name: Run cargo fmt
      run: cargo fmt --all -- --check
  # Build the compiled extension once per OS. Because the crate targets pyo3's
  # stable ABI (abi3-py39), a single wheel works across every supported Python
  # version, so there is no reason to recompile Rust per Python version.
  build:
    name: Build wheel
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Build abi3 wheel
      run: |
        uv sync --frozen --no-install-project
        uv run --no-sync maturin build --out dist
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.os }}
        path: dist/*.whl
        if-no-files-found: error
  python-linting:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Download prebuilt wheel
      uses: actions/download-artifact@v4
      with:
        name: wheel-ubuntu-latest
        path: dist
    - name: Install Dependencies
      run: |
        uv sync --frozen --no-install-project
        uv pip install --no-index --no-deps --find-links dist polars-random
    - name: Ruff format check
      run: uv run --no-sync ruff format polars_random tests --check
    - name: Lint with ruff
      run: uv run --no-sync ruff check .
    - name: ty check
      run: uv run --no-sync ty check polars_random tests
  testing:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Download prebuilt wheel
      uses: actions/download-artifact@v4
      with:
        name: wheel-${{ matrix.os }}
        path: dist
    - name: Install Dependencies
      run: |
        uv sync --frozen --no-install-project
        uv pip install --no-index --no-deps --find-links dist polars-random
    - name: Test with pytest
      run: uv run --no-sync pytest
